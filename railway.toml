[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ---------------------------------------------------------------------------
# Cron endpoints (call with Authorization: Bearer $CRON_SECRET)
#
# POST /api/cron/daily-digest
#   Schedule: 0 8 * * *  (daily at 08:00 UTC)
# POST /api/cron/due-reminders
#   Schedule: 0 * * * *  (every hour)
# POST /api/cron/materialize-recurrence
#   Schedule: 0 2 * * *  (daily at 02:00 UTC)
#
# Required env vars: RESEND_API_KEY, EMAIL_FROM, CRON_SECRET, NEXT_PUBLIC_APP_URL
# ---------------------------------------------------------------------------

[[cronJobs]]
name = "materialize-recurrence"
schedule = "0 2 * * *"
command = "curl -sf -X POST $RAILWAY_PUBLIC_DOMAIN/api/cron/materialize-recurrence -H 'Authorization: Bearer $CRON_SECRET'"
